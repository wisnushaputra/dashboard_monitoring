services:
  db:
    image: postgres:16-alpine
    container_name: noc_db
    environment:
      POSTGRES_DB: dashboard_monitoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: noc_backend
    environment:
      DATABASE_URL: "postgresql://postgres:${DB_PASSWORD:-password}@db:5432/dashboard_monitoring"
      JWT_SECRET: ${JWT_SECRET:-noc-dashboard-secret}
      PORT: "4000"
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    container_name: noc_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
