server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Increase buffer sizes for large API responses (PDF/Excel exports)
    client_max_body_size 20M;

    # API reverse proxy to backend container
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # WebSocket reverse proxy for real-time events
    location /socket.io/ {
        proxy_pass http://backend:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri /index.html;
    }

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
